# Authoritative manifest of mirrored sources.
# Every top-level folder in this repo must have an entry here.
# status: planned | pulled | refreshing (refreshing = nightly job covers it)

sources:
  - name: paperclip
    lane: 1
    method: git-subtree-copy
    upstream: local clone E:\clones\paperclip (docs/ + doc/ + AGENTS.md)
    folder: paperclip/
    refresh: git -C E:\clones\paperclip pull, then copy docs/ doc/ AGENTS.md
    status: pulled

  - name: litellm
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/BerriAI/litellm (docs/my-website/docs/)
    folder: litellm/
    refresh: shallow clone/pull, copy docs/my-website/docs/
    status: planned

  - name: langchain
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/langchain-ai/langchain (docs dir)
    folder: langchain/
    refresh: shallow clone/pull, copy docs dir
    status: planned

  - name: langgraph
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/langchain-ai/langgraph (docs dir)
    folder: langgraph/
    refresh: shallow clone/pull, copy docs dir
    status: planned

  - name: langsmith
    lane: 1
    method: git-subtree-copy
    upstream: langchain-ai LangSmith docs repo (verify exact repo; site publishes llms.txt as fallback)
    folder: langsmith/
    refresh: shallow clone/pull, copy docs dir
    status: planned

  - name: codex
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/openai/codex (docs/)
    folder: codex/
    refresh: shallow clone/pull, copy docs/
    status: pulled

  - name: hermes
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/IntegriGit/rocky-brain (docs/ and compiled/)
    folder: hermes/
    refresh: shallow clone/pull, copy all markdown files
    status: pulled

  - name: claude-code
    lane: 1
    method: git-subtree-copy
    upstream: anthropics docs repos + CHANGELOG.md in https://github.com/anthropics/claude-code
    folder: claude-code/
    refresh: shallow clone/pull, copy docs + changelog
    status: pulled

  - name: antigravity
    lane: 2
    method: llms-txt
    upstream: https://antigravity.google/llms.txt
    folder: antigravity/
    refresh: curl -s https://antigravity.google/llms.txt > antigravity/llms.txt
    status: pulled

  - name: claude-platform
    lane: 2
    method: llms-txt
    upstream: https://platform.claude.com/llms.txt
    folder: claude-platform/
    refresh: curl -s https://platform.claude.com/llms.txt > claude-platform/llms.txt
    status: pulled

# Lane 3 (doc-to-MD converter / tavily-crawl residue) entries are added as the
# llms.txt probe (INT-118 lane 2 child issue) identifies which vendors have
# neither a docs repo nor an llms.txt endpoint.

  - name: docker
    lane: 3
    method: tavily-crawl
    upstream: https://docs.docker.com
    folder: docker/
    refresh: "curl https://docs.docker.com/ | pandoc -f html -t markdown > docker/engine.md; curl https://docs.docker.com/compose/ | pandoc -f html -t markdown > docker/compose.md"
    status: pulled

  - name: tailscale
    lane: 3
    method: tavily-crawl
    upstream: https://tailscale.com/kb/
    folder: tailscale/
    refresh: "curl https://tailscale.com/kb/ | pandoc -f html -t markdown > tailscale/kb.md"
    status: pulled

  - name: netbox
    lane: 3
    method: tavily-crawl
    upstream: https://docs.netbox.dev/
    folder: netbox/
    refresh: "curl https://docs.netbox.dev/ | pandoc -f html -t markdown > netbox/docs.md"
    status: pulled

  - name: openai
    lane: 3
    method: tavily-crawl
    upstream: https://platform.openai.com/docs/
    folder: openai/
    refresh: "curl https://platform.openai.com/docs/ | pandoc -f html -t markdown > openai/docs.md"
    status: pulled

  - name: google-cloud
    lane: 3
    method: tavily-crawl
    upstream: https://cloud.google.com/docs
    folder: google-cloud/
    refresh: "curl https://cloud.google.com/docs | pandoc -f html -t markdown > google-cloud/docs.md"
    status: pulled
