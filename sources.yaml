# Authoritative manifest of mirrored sources.
# Every top-level folder in this repo must have an entry here.
# status: planned | pulled | refreshing (refreshing = nightly job covers it)

sources:
  - name: paperclip
    lane: 1
    method: git-subtree-copy
    upstream: local clone E:\clones\paperclip (docs/ + doc/ + AGENTS.md)
    folder: paperclip/
    refresh: git -C E:\clones\paperclip pull, then copy docs/ doc/ AGENTS.md
    status: pulled

  - name: litellm
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/BerriAI/litellm-docs (docs/)
    folder: litellm/
    refresh: >
      git clone --depth 1 https://github.com/BerriAI/litellm-docs.git /tmp/_litellm-scratch &&
      find /tmp/_litellm-scratch/docs -name '*.md' |
      while read f; do rel="${f#/tmp/_litellm-scratch/docs/}";
        mkdir -p "litellm/$(dirname "$rel")"; cp "$f" "litellm/$rel"; done &&
      rm -rf /tmp/_litellm-scratch
    status: pulled

  - name: langchain
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/langchain-ai/docs (src/oss/langchain/)
    folder: langchain/
    refresh: >
      git clone --depth 1 https://github.com/langchain-ai/docs.git /tmp/_langchain-scratch &&
      find /tmp/_langchain-scratch/src/oss/langchain -name '*.mdx' -o -name '*.md' |
      while read f; do rel="${f#/tmp/_langchain-scratch/src/oss/langchain/}";
        mkdir -p "langchain/$(dirname "$rel")"; cp "$f" "langchain/$rel"; done &&
      rm -rf /tmp/_langchain-scratch
    status: pulled

  - name: langgraph
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/langchain-ai/docs (src/oss/langgraph/)
    folder: langgraph/
    refresh: >
      git clone --depth 1 https://github.com/langchain-ai/docs.git /tmp/_langchain-scratch &&
      find /tmp/_langchain-scratch/src/oss/langgraph -name '*.mdx' -o -name '*.md' |
      while read f; do rel="${f#/tmp/_langchain-scratch/src/oss/langgraph/}";
        mkdir -p "langgraph/$(dirname "$rel")"; cp "$f" "langgraph/$rel"; done &&
      rm -rf /tmp/_langchain-scratch
    status: pulled

  - name: langsmith
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/langchain-ai/docs (src/langsmith/)
    folder: langsmith/
    refresh: >
      git clone --depth 1 https://github.com/langchain-ai/docs.git /tmp/_langchain-scratch &&
      find /tmp/_langchain-scratch/src/langsmith -name '*.mdx' -o -name '*.md' |
      while read f; do rel="${f#/tmp/_langchain-scratch/src/langsmith/}";
        mkdir -p "langsmith/$(dirname "$rel")"; cp "$f" "langsmith/$rel"; done &&
      rm -rf /tmp/_langchain-scratch
    status: pulled

  - name: codex
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/openai/codex (docs/)
    folder: codex/
    refresh: shallow clone/pull, copy docs/
    status: pulled

  - name: hermes
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/IntegriGit/rocky-brain (docs/ and compiled/)
    folder: hermes/
    refresh: shallow clone/pull, copy all markdown files
    status: pulled

  - name: claude-code
    lane: 2
    method: llms-txt + git-subtree-copy
    upstream: https://code.claude.com/docs/llms-full.txt (CLI docs, distinct from claude-platform) + CHANGELOG.md in https://github.com/anthropics/claude-code
    folder: claude-code/
    refresh: >
      curl -s https://code.claude.com/docs/llms.txt > claude-code/llms.txt &&
      curl -s https://code.claude.com/docs/llms-full.txt > claude-code/llms-full.txt;
      shallow clone/pull anthropics/claude-code, copy CHANGELOG.md
    status: pulled

  - name: antigravity
    lane: 2
    method: llms-txt
    upstream: https://antigravity.google/llms.txt
    folder: antigravity/
    refresh: curl -s https://antigravity.google/llms.txt > antigravity/llms.txt
    status: pulled

  - name: claude-platform
    lane: 2
    method: llms-txt
    upstream: https://platform.claude.com/llms.txt
    folder: claude-platform/
    refresh: curl -s https://platform.claude.com/llms.txt > claude-platform/llms.txt
    status: pulled

# Lane 3 (doc-to-MD converter / tavily-crawl residue) entries are added as the
# llms.txt probe (INT-118 lane 2 child issue) identifies which vendors have
# neither a docs repo nor an llms.txt endpoint.

  - name: docker
    lane: 1
    method: git-subtree-copy + llms-txt
    upstream: https://github.com/docker/docs (content/manuals/compose, content/manuals/engine, content/reference/cli/docker) + https://docs.docker.com/llms.txt
    folder: docker/
    refresh: >
      sparse clone docker/docs (depth 1, blob:none), copy the three scoped
      content subtrees into docker/; curl -s https://docs.docker.com/llms.txt > docker/llms.txt
    status: pulled

  - name: tailscale
    lane: 3
    method: html-to-md (no llms.txt upstream; tavily-crawl for nightly extension)
    upstream: https://tailscale.com/kb/ (15 core KB pages pulled 2026-07-04 via python html2text into tailscale/kb/)
    folder: tailscale/
    refresh: >
      python html2text pull of core KB pages (what-is-tailscale, install, acls,
      grants, subnets, exit-nodes, magicdns, tailscale-ssh, serve, funnel,
      auth-keys, api, taildrop, troubleshooting, cli) into tailscale/kb/
    status: pulled

  - name: netbox
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/netbox-community/netbox (docs/, mkdocs markdown)
    folder: netbox/
    refresh: sparse clone netbox-community/netbox (depth 1, blob:none), copy docs/ into netbox/
    status: pulled

  - name: openai
    lane: 3
    method: tavily-crawl
    upstream: https://platform.openai.com/docs/
    folder: openai/
    refresh: "curl https://platform.openai.com/docs/ | pandoc -f html -t markdown > openai/docs.md"
    status: pulled

  - name: google-cloud
    lane: 3
    method: tavily-crawl
    upstream: https://cloud.google.com/docs
    folder: google-cloud/
    refresh: "curl https://cloud.google.com/docs | pandoc -f html -t markdown > google-cloud/docs.md"
    status: pulled

# Lane 4 (memory stack, INT-131) — added 2026-07-04

  - name: honcho
    lane: 2
    method: llms-txt + git-subtree-copy
    upstream: https://docs.honcho.dev/llms-full.txt + https://github.com/plastic-labs/honcho (docs/v3 + root md + compose/config examples)
    folder: honcho/
    refresh: >
      curl -s https://docs.honcho.dev/llms.txt > honcho/llms.txt &&
      curl -s https://docs.honcho.dev/llms-full.txt > honcho/llms-full.txt;
      shallow clone plastic-labs/honcho, copy README/CHANGELOG/CLAUDE.md,
      docker-compose.yml.example, config.toml.example, docs/v3 into honcho/repo/
    status: pulled

  - name: redis
    lane: 1
    method: git-subtree-copy
    upstream: https://github.com/redis/docs — SCOPED to content/develop/data-types/timeseries, content/develop/ai, content/develop/interact/search-and-query, content/operate/oss_and_stack (not the whole redis-doc firehose)
    folder: redis/
    refresh: >
      sparse clone redis/docs (depth 1, blob:none), sparse-checkout the four
      scoped subtrees, copy *.md into redis/ preserving paths under content/;
      curl -s https://redis.io/llms.txt > redis/llms.txt
    status: pulled

  - name: neo4j
    lane: 2
    method: llms-txt + git-subtree-copy
    upstream: https://neo4j.com/docs/llms.txt + https://github.com/neo4j/docs-getting-started (asciidoc incl. data modeling) + https://github.com/neo4j/neo4j-graphrag-python (docs/)
    folder: neo4j/
    refresh: >
      curl -s https://neo4j.com/llms.txt > neo4j/llms.txt &&
      curl -s https://neo4j.com/docs/llms.txt > neo4j/llms-docs-index.txt;
      sparse clone the two repos, copy getting-started modules/ROOT into
      neo4j/getting-started/ and graphrag docs into neo4j/graphrag-python/
    status: pulled

  - name: mem0
    lane: 2
    method: llms-txt
    upstream: https://docs.mem0.ai/llms-full.txt
    folder: mem0/
    refresh: >
      curl -s https://docs.mem0.ai/llms.txt > mem0/llms.txt &&
      curl -s https://docs.mem0.ai/llms-full.txt > mem0/llms-full.txt
    status: pulled

  - name: zep
    lane: 2
    method: llms-txt (per-page .md)
    upstream: https://help.getzep.com/v3/llms.txt — index links end in .md; fetch each as-is
    folder: zep/
    refresh: >
      curl -s https://help.getzep.com/llms.txt > zep/llms.txt &&
      curl -s https://help.getzep.com/v3/llms.txt > zep/llms-v3-index.txt;
      fetch every https://help.getzep.com/*.md link from the v3 index into
      zep/docs/ (drop <!DOCTYPE and "Page Not Found" responses)
    status: pulled

  - name: letta
    lane: 2
    method: llms-txt
    upstream: https://docs.letta.com/llms-full.txt
    folder: letta/
    refresh: >
      curl -s https://docs.letta.com/llms.txt > letta/llms.txt &&
      curl -s https://docs.letta.com/llms-full.txt > letta/llms-full.txt
    status: pulled
